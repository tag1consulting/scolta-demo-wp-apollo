name: counting-down-apollo
type: wordpress
docroot: ""
php_version: "8.3"
webserver_type: nginx-fpm
router_http_port: "80"
router_https_port: "443"
database:
  type: mariadb
  version: "10.11"
composer_version: "2"
web_environment:
  - SCOLTA_API_KEY=SCOLTA_API_KEY_PLACEHOLDER

hooks:
  post-start:
    - exec: "cd /var/www/html/wp-content/plugins/scolta-wp && composer install --no-interaction --no-dev"
    - exec-host: "[ -f db/dump.sql.gz ] && ddev import-db --file=db/dump.sql.gz || true"
    - exec: "wp option update siteurl 'https://counting-down-apollo.ddev.site' 2>/dev/null || true"
    - exec: "wp option update home 'https://counting-down-apollo.ddev.site' 2>/dev/null || true"
